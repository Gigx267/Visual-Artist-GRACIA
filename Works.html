<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Gracia Lwanzo Kasongo — limited edition mixed media paintings celebrating African femininity, Adinkrahene symbolism, and spiritual sovereignty.">
    <title>Gracia Lwanzo Kasongo | Artworks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0A0A08;
            --bg-elevated: #131310;
            --text-primary: #EAE9E2;
            --text-secondary: #B8B7AE;
            --gold-primary: #C8A951;
            --gold-dim: #8E793E;
            --border-subtle: #2A2A26;
            --card-bg: #141411;
            --transition-smooth: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 1.2rem 2rem;
            transition: var(--transition-smooth);
            background: transparent;
        }

        .navbar.scrolled {
            background: rgba(10, 10, 8, 0.92);
            backdrop-filter: blur(14px);
            padding: 0.8rem 2rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            text-decoration: none;
            background: linear-gradient(135deg, #fff 30%, var(--gold-primary) 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2.8rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--gold-primary);
        }

        .contact-btn {
            border: 1px solid var(--gold-primary);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            transition: background 0.2s;
        }

        .contact-btn:hover {
            background: var(--gold-primary);
            color: #0A0A08 !important;
        }

        .menu-icon {
            display: none;
            flex-direction: column;
            background: transparent;
            border: none;
            cursor: pointer;
            gap: 6px;
        }

        .menu-icon span {
            width: 26px;
            height: 2px;
            background: var(--text-primary);
            transition: 0.2s;
        }

        /* hero */
        .hero {
            text-align: center;
            padding: 10rem 2rem 4rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: -1px;
            margin-bottom: 1.2rem;
            background: linear-gradient(to right, #fff, var(--gold-primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* gallery grid */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 5rem;
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 2.2rem;
        }

        .art-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: var(--transition-smooth);
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(2px);
            transform: translateY(0);
        }

        .art-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold-dim);
            box-shadow: 0 25px 35px -15px rgba(0,0,0,0.6);
        }

        .card-media {
            position: relative;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            background: #1a1a17;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .art-card:hover .card-media img {
            transform: scale(1.03);
        }

        .badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gold-primary);
            color: #0A0A08;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            letter-spacing: 1px;
            z-index: 2;
        }

        .card-info {
            padding: 1.5rem 1.3rem 1.8rem;
        }

        .art-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }

        .art-sub {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--gold-primary);
            letter-spacing: 1.2px;
            margin-bottom: 0.8rem;
        }

        .art-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.45;
            margin-bottom: 1.2rem;
        }

        .art-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid var(--border-subtle);
            padding-top: 1rem;
            margin-top: 0.2rem;
        }

        .dimensions {
            font-size: 0.7rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .price {
            font-family: 'Inter', monospace;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--gold-primary);
        }

        /* lightbox premium */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 3, 0.96);
            backdrop-filter: blur(18px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0s 0.3s;
        }

        .lightbox.active {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .lb-container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            width: 90%;
            background: rgba(20, 20, 17, 0.9);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(200, 169, 81, 0.3);
        }

        .lb-img {
            flex: 1.3;
            min-width: 280px;
            background: #0c0c09;
        }

        .lb-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .lb-details {
            flex: 1;
            padding: 2.5rem;
            background: #131310;
        }

        .lb-close {
            position: absolute;
            top: 1.8rem;
            right: 2.2rem;
            font-size: 3rem;
            color: var(--text-primary);
            background: none;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 300;
            line-height: 1;
        }

        .lb-close:hover {
            color: var(--gold-primary);
            transform: scale(1.05);
        }

        /* audio widget */
        .audio-widget {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            display: flex;
            gap: 0.8rem;
            align-items: center;
            z-index: 999;
            border: 1px solid var(--border-subtle);
            font-size: 0.9rem;
        }

        .audio-btn {
            background: transparent;
            border: 1px solid var(--gold-dim);
            color: var(--text-primary);
            padding: 0.3rem 0.9rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .audio-btn:hover {
            background: var(--gold-primary);
            color: #0A0A08;
            border-color: var(--gold-primary);
        }

        footer {
            text-align: center;
            padding: 2.5rem;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        @media (max-width: 780px) {
            .menu-icon {
                display: flex;
            }
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 70%;
                height: 100vh;
                background: #0f0f0d;
                flex-direction: column;
                justify-content: center;
                gap: 2rem;
                transition: 0.3s ease;
                backdrop-filter: blur(20px);
                z-index: 1001;
                border-left: 1px solid var(--gold-dim);
            }
            .nav-links.open {
                right: 0;
            }
            .logo {
                z-index: 1002;
            }
            .hero h1 {
                font-size: 2.4rem;
            }
            .lb-container {
                flex-direction: column;
                max-height: 90vh;
                overflow-y: auto;
            }
            .audio-widget {
                bottom: 1rem;
                right: 1rem;
                padding: 0.4rem 1rem;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .art-card {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="nav-inner">
        <a href="index.html" class="logo">Gracia Lwanzo
Kasongo </a>
        <button class="menu-icon" id="menuToggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="Biography.html">Biography</a></li>
            <li><a href="Works.html" class="active">Artworks</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html" class="contact-btn">Contact</a></li>
        </ul>
    </div>
</nav>

<main>
    <div class="hero">
        <h1>Artworks</h1>
        <p>Limited edition mixed-media paintings celebrating African femininity, Adinkrahene symbolism, and spiritual sovereignty.</p>
    </div>

    <div class="gallery-container">
        <div class="art-grid" id="artGrid"></div>
    </div>
</main>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="closeLightboxBtn" aria-label="Close lightbox">&times;</button>
    <div class="lb-container">
        <div class="lb-img">
            <img id="lightboxImg" src="" alt="Artwork detail">
        </div>
        <div class="lb-details" id="lightboxDetails"></div>
    </div>
</div>

<div class="audio-widget">
    <span>🎧</span>
    <button id="playMusicBtn" class="audio-btn">Play</button>
    <button id="muteMusicBtn" class="audio-btn">Mute</button>
</div>
<audio id="ambientMusic" loop preload="metadata">
    <source src="mm2.mp3" type="audio/mpeg">
</audio>

<footer>
    <p>© Gracia Lwanzo Kasongo — All works registered with Certificate of Authenticity</p>
</footer>

<script>
    // --------------------------------------------------------------
    // Artwork dataset (exactly as provided)
    // --------------------------------------------------------------
    const artworks = [
        { id: 1, title: "Helimu", subtitle: "Bold Line Fauvism", desc: "Celebrates the vibrant architecture of the mind and beauty with neo-expressionist fire.", dimensions: "42 × 59.4 cm", price: "€411", img: "art (5).jpeg", badge: null, framed: "Framed + CoA" },
        { id: 2, title: "Nuru ya Moja", subtitle: "Mixed Media with Real Cauris", desc: "Symbolizes the power of a single spark to illuminate darkness and change the world.", dimensions: "42 × 59.4 cm", price: "€511", img: "aa2.png", badge: null, framed: "Standard Cut" },
        { id: 3, title: "Roho Yangu", subtitle: "Acrylic & Mixed Media with Shells", desc: "“My Heart” — a spiritual exploration of self-connection and ancestral wisdom.", dimensions: "42 × 59.4 cm", price: "€613", img: "art (4).jpeg", badge: null, framed: "Framed + CoA" },
        { id: 4, title: "The Sovereign of Origins", subtitle: "Acrylic & Mixed Media with Shells", desc: "Bridges ancient cowrie symbolism with bold contemporary expressionism.", dimensions: "42 × 59.4 cm", price: "€417", img: "art (7).jpeg", badge: null, framed: "Framed + CoA" },
        { id: 5, title: "Muda", subtitle: "Bold Line Fauvism • Mixed Media", desc: "“Time” — exploring the emotional and cyclical nature of periods and existence.", dimensions: "42 × 59.4 cm", price: "€397", img: "aa3.png", badge: null, framed: "Framed + CoA" },
        { id: 6, title: "Hatima", subtitle: "Bold Line Fauvism • Mixed Media", desc: "A powerful critique of destiny and a celebration of introspection and vibrant energy.", dimensions: "42 × 59.4 cm", price: "€417", img: "w6.png", badge: null, framed: "Framed + CoA" },
        { id: 7, title: "Voice of a Silenced Grace", subtitle: "Bold Line Fauvism", desc: "Inspired by the Pwo mask of the Kongo kingdom — a meditation on African feminine identity.", dimensions: "42 × 59.4 cm", price: "€317", img: "art (6).jpeg", badge: null, framed: "Framed + CoA" },
        { id: 8, title: "Wakati", subtitle: "Bold Line Fauvism • Mixed Media", desc: "Activism piece reclaiming time and agency for Black women.", dimensions: "42 × 59.4 cm", price: "€635", img: "w2.png", badge: null, framed: "Framed + CoA" },
        { id: 9, title: "The Queen of the Blooms", subtitle: "Mixed Media • Work in Progress", desc: "Evolution of Adinkrahene and floral spirit into refined modern femininity.", dimensions: "42 × 59.4 cm", price: "€1,125", img: "w1.png", badge: "PRE-ORDER", framed: "Framed + CoA" }
    ];

    // render dynamic gallery
    const gridContainer = document.getElementById('artGrid');

    function renderArtworks() {
        if (!gridContainer) return;
        gridContainer.innerHTML = '';
        artworks.forEach(art => {
            const card = document.createElement('div');
            card.className = 'art-card';
            card.setAttribute('data-id', art.id);
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');
            card.setAttribute('aria-label', `View details for ${art.title}`);
            
            // Construct badge if exists
            const badgeHTML = art.badge ? `<div class="badge">${art.badge}</div>` : '';
            
            card.innerHTML = `
                <div class="card-media">
                    <img src="${art.img}" alt="${art.title}" loading="lazy" onerror="this.onerror=null;this.src='https://placehold.co/800x1000?text=Artwork+Unavailable';">
                    ${badgeHTML}
                </div>
                <div class="card-info">
                    <h3 class="art-title">${art.title}</h3>
                    <div class="art-sub">${art.subtitle}</div>
                    <p class="art-desc">${art.desc}</p>
                    <div class="art-meta">
                        <div class="dimensions"><strong>${art.dimensions}</strong><br>${art.framed}</div>
                        <div class="price">${art.price}</div>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => openLightbox(art));
            card.addEventListener('keydown', (e) => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(art); } });
            gridContainer.appendChild(card);
        });
    }

    // LIGHTBOX refined
    const lightboxEl = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxDetails = document.getElementById('lightboxDetails');

    function openLightbox(art) {
        // set high-res image (fallback same source)
        lightboxImg.src = art.img;
        lightboxImg.alt = art.title;
        lightboxDetails.innerHTML = `
            <h2 style="font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 500; margin-bottom: 0.5rem; letter-spacing: -0.3px; color: var(--text-primary);">${art.title}</h2>
            <p style="color: var(--gold-primary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 1.5rem;">${art.subtitle}</p>
            <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem;">${art.desc}</p>
            <div style="border-top: 1px solid var(--border-subtle); padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
                <div><span style="font-size:0.7rem; color:var(--text-secondary); text-transform:uppercase;">Dimensions</span><br><strong style="font-size:1rem;">${art.dimensions}</strong><br><span style="font-size:0.7rem; color:var(--gold-dim);">${art.framed}</span></div>
                <div class="price" style="font-size: 1.8rem;">${art.price}</div>
            </div>
            <a href="#" style="display: inline-block; margin-top: 2rem; background: var(--gold-primary); color: #0A0A08; padding: 0.8rem 1.8rem; text-decoration: none; font-weight: 600; font-size: 0.7rem; letter-spacing: 1px; border-radius: 40px; text-align: center; transition: all 0.2s;">Inquire →</a>
        `;
        lightboxEl.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightboxEl.classList.remove('active');
        document.body.style.overflow = '';
    }

    document.getElementById('closeLightboxBtn')?.addEventListener('click', closeLightbox);
    lightboxEl?.addEventListener('click', (e) => { if(e.target === lightboxEl) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && lightboxEl.classList.contains('active')) closeLightbox(); });

    // mobile menu toggle (enhanced)
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    if(menuToggle && navLinks) {
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            const expanded = navLinks.classList.contains('open');
            menuToggle.setAttribute('aria-expanded', expanded);
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('open');
                if(menuToggle) menuToggle.setAttribute('aria-expanded', 'false');
            });
        });
    }

    // scroll navbar effect
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 30) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });

    // ambient audio with robust controls + autoplay attempt
    const audio = document.getElementById('ambientMusic');
    const playBtn = document.getElementById('playMusicBtn');
    const muteBtn = document.getElementById('muteMusicBtn');

    if (audio) {
        audio.volume = 0.25;
        let autoPlayAttempted = false;

        const updateAudioButtons = () => {
            if(playBtn) playBtn.textContent = audio.paused ? 'Play' : 'Pause';
            if(muteBtn) muteBtn.textContent = audio.muted ? 'Unmute' : 'Mute';
        };

        const attemptAutoPlay = () => {
            if (autoPlayAttempted) return;
            autoPlayAttempted = true;
            audio.play().then(() => {
                updateAudioButtons();
            }).catch((err) => {
                console.log("autoplay prevented, user interaction needed");
                // still display default
            });
        };
        
        window.addEventListener('load', () => {
            attemptAutoPlay();
            // small fallback after user first click anywhere to allow audio if needed
            const enableAudioOnFirstInteraction = () => {
                if (audio.paused && !autoPlayAttempted) {
                    audio.play().catch(e => null);
                }
                document.removeEventListener('click', enableAudioOnFirstInteraction);
                document.removeEventListener('touchstart', enableAudioOnFirstInteraction);
            };
            document.addEventListener('click', enableAudioOnFirstInteraction);
            document.addEventListener('touchstart', enableAudioOnFirstInteraction);
        });

        if (playBtn) {
            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play().catch(e => console.warn(e));
                } else {
                    audio.pause();
                }
                updateAudioButtons();
            });
        }
        if (muteBtn) {
            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                audio.muted = !audio.muted;
                updateAudioButtons();
            });
        }
        audio.addEventListener('playing', updateAudioButtons);
        audio.addEventListener('pause', updateAudioButtons);
        audio.addEventListener('volumechange', updateAudioButtons);
    }

    // fallback for broken images globally
    document.addEventListener('error', (e) => {
        if (e.target.tagName === 'IMG' && !e.target.hasAttribute('data-fallback')) {
            e.target.setAttribute('data-fallback', 'true');
            e.target.src = 'https://placehold.co/800x1000?text=Artwork+Preview';
        }
    }, true);

    // initialize artwork rendering
    renderArtworks();

    // add some subtle preload effect & clean style to price + badge
    // also ensure the "PRE-ORDER" badge from dataset appears dynamically
    console.log("Gracia Kasongo gallery — all 9 artworks loaded");
</script>
</body>
</html>
